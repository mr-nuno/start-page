<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 500" preserveAspectRatio="xMidYMax slice">
  <defs>
    <!-- Sky gradient -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0c18"/>
      <stop offset="40%" stop-color="#0e1225"/>
      <stop offset="100%" stop-color="#111630"/>
    </linearGradient>
    <!-- Water gradient -->
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1228"/>
      <stop offset="100%" stop-color="#080a14"/>
    </linearGradient>
    <!-- Aurora glow -->
    <radialGradient id="glow1" cx="30%" cy="25%" r="40%">
      <stop offset="0%" stop-color="rgba(124,108,255,0.12)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glow2" cx="70%" cy="20%" r="35%">
      <stop offset="0%" stop-color="rgba(0,229,255,0.08)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glow3" cx="50%" cy="35%" r="30%">
      <stop offset="0%" stop-color="rgba(255,61,154,0.06)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <!-- Reflection shimmer -->
    <linearGradient id="refl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="30%" stop-color="rgba(124,108,255,0.04)"/>
      <stop offset="50%" stop-color="rgba(0,229,255,0.06)"/>
      <stop offset="70%" stop-color="rgba(124,108,255,0.04)"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="1600" height="500" fill="url(#sky)"/>

  <!-- Aurora glows -->
  <rect width="1600" height="500" fill="url(#glow1)"/>
  <rect width="1600" height="500" fill="url(#glow2)"/>
  <rect width="1600" height="500" fill="url(#glow3)"/>

  <!-- Stars -->
  <circle cx="120" cy="45" r="1" fill="rgba(255,255,255,0.3)"/>
  <circle cx="340" cy="80" r="0.8" fill="rgba(255,255,255,0.2)"/>
  <circle cx="520" cy="35" r="1.2" fill="rgba(255,255,255,0.25)"/>
  <circle cx="780" cy="65" r="0.7" fill="rgba(255,255,255,0.15)"/>
  <circle cx="950" cy="40" r="1" fill="rgba(255,255,255,0.2)"/>
  <circle cx="1150" cy="75" r="0.9" fill="rgba(255,255,255,0.25)"/>
  <circle cx="1350" cy="50" r="1.1" fill="rgba(255,255,255,0.2)"/>
  <circle cx="1480" cy="90" r="0.8" fill="rgba(255,255,255,0.15)"/>
  <circle cx="250" cy="110" r="0.6" fill="rgba(255,255,255,0.12)"/>
  <circle cx="680" cy="100" r="0.7" fill="rgba(255,255,255,0.1)"/>
  <circle cx="1050" cy="25" r="0.9" fill="rgba(255,255,255,0.18)"/>
  <circle cx="1250" cy="105" r="0.5" fill="rgba(255,255,255,0.1)"/>

  <!-- Water -->
  <rect x="0" y="340" width="1600" height="160" fill="url(#water)"/>
  <!-- Water line -->
  <line x1="0" y1="340" x2="1600" y2="340" stroke="rgba(100,120,180,0.08)" stroke-width="1"/>

  <!-- Water reflections -->
  <rect x="0" y="345" width="1600" height="80" fill="url(#refl)" opacity="0.5"/>
  <line x1="200" y1="360" x2="320" y2="360" stroke="rgba(124,108,255,0.05)" stroke-width="1"/>
  <line x1="500" y1="375" x2="650" y2="375" stroke="rgba(0,229,255,0.04)" stroke-width="1"/>
  <line x1="900" y1="365" x2="1050" y2="365" stroke="rgba(124,108,255,0.04)" stroke-width="1"/>
  <line x1="1200" y1="380" x2="1380" y2="380" stroke="rgba(0,229,255,0.03)" stroke-width="1"/>

  <!-- Distant shore / treeline left -->
  <path d="M0,335 Q80,328 160,332 Q240,325 320,330 Q400,322 480,328 Q520,324 560,330 L560,340 L0,340 Z"
        fill="#0a0e1c" opacity="0.7"/>

  <!-- Distant shore right -->
  <path d="M1050,332 Q1120,326 1200,330 Q1280,324 1360,328 Q1440,322 1520,326 Q1560,324 1600,328 L1600,340 L1050,340 Z"
        fill="#0a0e1c" opacity="0.6"/>

  <!-- === THE FAMOUS CRANE (LKAB ore crane / harbor crane) === -->
  <!-- Main vertical tower -->
  <g fill="none" stroke="rgba(140,155,190,0.25)" stroke-width="2">
    <!-- Left tower leg -->
    <line x1="720" y1="340" x2="735" y2="160"/>
    <line x1="740" y1="340" x2="745" y2="160"/>
    <!-- Right tower leg -->
    <line x1="800" y1="340" x2="785" y2="160"/>
    <line x1="820" y1="340" x2="795" y2="160"/>
    <!-- Cross braces on tower -->
    <line x1="728" y1="310" x2="792" y2="310"/>
    <line x1="730" y1="280" x2="790" y2="280"/>
    <line x1="733" y1="250" x2="787" y2="250"/>
    <line x1="735" y1="220" x2="785" y2="220"/>
    <line x1="738" y1="190" x2="782" y2="190"/>
    <!-- X braces -->
    <line x1="728" y1="340" x2="792" y2="310"/>
    <line x1="792" y1="340" x2="728" y2="310"/>
    <line x1="730" y1="310" x2="790" y2="280"/>
    <line x1="790" y1="310" x2="730" y2="280"/>
    <line x1="733" y1="280" x2="787" y2="250"/>
    <line x1="787" y1="280" x2="733" y2="250"/>
    <line x1="735" y1="250" x2="785" y2="220"/>
    <line x1="785" y1="250" x2="735" y2="220"/>
  </g>

  <!-- Boom / jib arm extending right -->
  <g fill="none" stroke="rgba(140,155,190,0.22)" stroke-width="2">
    <line x1="740" y1="165" x2="1020" y2="185"/>
    <line x1="740" y1="155" x2="1020" y2="175"/>
    <!-- Jib cross braces -->
    <line x1="800" y1="157" x2="800" y2="180"/>
    <line x1="860" y1="160" x2="860" y2="182"/>
    <line x1="920" y1="163" x2="920" y2="183"/>
    <line x1="980" y1="166" x2="980" y2="184"/>
    <!-- X braces on jib -->
    <line x1="740" y1="155" x2="800" y2="180"/>
    <line x1="800" y1="157" x2="860" y2="182"/>
    <line x1="860" y1="160" x2="920" y2="183"/>
    <line x1="920" y1="163" x2="980" y2="184"/>
  </g>

  <!-- Counter-jib (left) -->
  <g fill="none" stroke="rgba(140,155,190,0.2)" stroke-width="2">
    <line x1="740" y1="165" x2="620" y2="175"/>
    <line x1="740" y1="155" x2="620" y2="168"/>
    <!-- Counterweight block -->
    <rect x="610" y="168" width="25" height="18" fill="rgba(100,115,150,0.12)" stroke="rgba(140,155,190,0.2)"/>
  </g>

  <!-- Top mast / A-frame -->
  <g fill="none" stroke="rgba(140,155,190,0.2)" stroke-width="1.5">
    <line x1="760" y1="155" x2="760" y2="120"/>
    <!-- Cable stays -->
    <line x1="760" y1="120" x2="1020" y2="180" stroke-dasharray="4,6"/>
    <line x1="760" y1="120" x2="620" y2="170" stroke-dasharray="4,6"/>
  </g>

  <!-- Hanging cable + hook -->
  <g stroke="rgba(140,155,190,0.18)" stroke-width="1.5" fill="none">
    <line x1="950" y1="183" x2="950" y2="290"/>
    <!-- Hook -->
    <path d="M945,290 L945,300 Q945,310 950,310 Q955,310 955,300 L955,290" stroke-width="2"/>
  </g>

  <!-- === Second smaller crane in distance === -->
  <g fill="none" stroke="rgba(120,135,170,0.12)" stroke-width="1.2" transform="translate(380,30) scale(0.5)">
    <line x1="720" y1="340" x2="740" y2="180"/>
    <line x1="800" y1="340" x2="780" y2="180"/>
    <line x1="730" y1="310" x2="790" y2="310"/>
    <line x1="733" y1="280" x2="787" y2="280"/>
    <line x1="736" y1="250" x2="784" y2="250"/>
    <line x1="740" y1="185" x2="960" y2="200"/>
    <line x1="740" y1="175" x2="960" y2="192"/>
    <line x1="760" y1="175" x2="760" y2="145"/>
    <line x1="760" y1="145" x2="960" y2="196" stroke-dasharray="3,5"/>
  </g>

  <!-- Harbor buildings / warehouses silhouette -->
  <path d="M560,340 L560,310 L590,310 L590,305 L640,305 L640,310 L680,310 L680,340 Z"
        fill="rgba(10,14,28,0.8)"/>
  <path d="M850,340 L850,318 L880,318 L880,312 L920,312 L920,318 L960,318 L960,340 Z"
        fill="rgba(10,14,28,0.6)"/>
  <!-- Small windows -->
  <rect x="570" y="318" width="4" height="4" fill="rgba(255,200,100,0.08)"/>
  <rect x="582" y="318" width="4" height="4" fill="rgba(255,200,100,0.06)"/>
  <rect x="610" y="312" width="4" height="4" fill="rgba(255,200,100,0.07)"/>
  <rect x="625" y="312" width="4" height="4" fill="rgba(255,200,100,0.05)"/>
  <rect x="865" y="322" width="4" height="4" fill="rgba(255,200,100,0.06)"/>
  <rect x="895" y="316" width="4" height="4" fill="rgba(255,200,100,0.05)"/>
  <rect x="940" y="322" width="4" height="4" fill="rgba(255,200,100,0.07)"/>

  <!-- Crane reflection in water -->
  <g opacity="0.08" transform="translate(0,680) scale(1,-1)">
    <line x1="720" y1="340" x2="735" y2="200" stroke="rgba(140,155,190,0.5)" stroke-width="1.5"/>
    <line x1="800" y1="340" x2="785" y2="200" stroke="rgba(140,155,190,0.5)" stroke-width="1.5"/>
    <line x1="740" y1="205" x2="980" y2="220" stroke="rgba(140,155,190,0.4)" stroke-width="1.5"/>
  </g>
</svg>
