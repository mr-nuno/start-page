<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Prop+Double+Ink&family=Geo&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="aurora"></div>

    <div class="page-wrapper">
        <div class="clock-wrapper">
            <div class="clock" id="clock">00:00:00</div>
            <div class="clock-date" id="clock-date"></div>
        </div>

        <div class="header">
            <div class="header-left">
                <div class="seinfeld-quote" id="seinfeld-quote"></div>
            </div>
            <div class="header-right">
                <div class="header-pill">
                    <span class="dot"></span>
                    <span id="header-temp">--</span>
                </div>
            </div>
        </div>

        <div class="grid">
            <div class="card" id="weather-card">
                <h2><span class="icon">&#9788;</span> Luleå</h2>
                <div class="loading">Loading weather</div>
            </div>

            <div class="card" id="system-card">
                <h2><span class="icon">&#9881;</span> System</h2>
                <div class="loading">Loading system info</div>
            </div>

            <div class="card full-width" id="comic-card">
                <h2><span class="icon">&#128214;</span> Calvin &amp; Hobbes</h2>
                <div class="loading">Loading strip</div>
            </div>

            <div class="card hockey full-width" id="sports-card">
                <h2><span class="icon">&#127954;</span> Luleå Hockey</h2>
                <div class="loading">Loading sports</div>
            </div>

            <div class="card" id="local-news-card">
                <h2><span class="icon">&#9878;</span> Norrbotten</h2>
                <div class="loading">Loading news</div>
            </div>

            <div class="card" id="global-news-card">
                <h2><span class="icon">&#127760;</span> World</h2>
                <div class="loading">Loading news</div>
            </div>

            <div class="card" id="guitar-card">
                <h2><span class="icon">&#127928;</span> Chord of the Day</h2>
                <div class="loading">Loading chord</div>
            </div>

            <div class="card full-width" id="song-card">
                <h2><span class="icon">&#127925;</span> Song of the Day</h2>
                <div class="loading">Loading song</div>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
